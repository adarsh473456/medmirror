<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}MedMirror{% endblock %}</title>
    <meta name="description" content="{% block meta_description %}MedMirror - AI-Powered Clinical Decision Simulation Platform{% endblock %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg-deep: #0a0f1e;
            --bg-card: rgba(13, 21, 38, 0.75);
            --border-subtle: rgba(55, 138, 221, 0.25);
            --border-active: #378ADD;
            --blue-glow: rgba(55, 138, 221, 0.55);
            --green-glow: rgba(99, 153, 34, 0.55);
            --accent-blue: #378ADD;
            --accent-green: #639922;
            --text-primary: #ffffff;
            --text-muted: #a0aec0;
            --text-dim: #718096;
            --font: 'Inter', sans-serif;
        }

        html, body {
            background-color: var(--bg-deep);
            color: var(--text-primary);
            font-family: var(--font);
            min-height: 100vh;
            line-height: 1.6;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-deep); }
        ::-webkit-scrollbar-thumb { background: var(--border-active); border-radius: 3px; }

        /* Nav */
        nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 3rem;
            border-bottom: 1px solid var(--border-subtle);
            background: rgba(10, 15, 30, 0.95);
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .nav-brand {
            font-size: 1.3rem;
            font-weight: 700;
            letter-spacing: 1px;
            background: linear-gradient(90deg, #ffffff, #b0c4de);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .nav-steps {
            display: flex;
            gap: 0.5rem;
            align-items: center;
            font-size: 0.8rem;
            color: var(--text-muted);
        }
        .nav-step { padding: 4px 12px; border-radius: 20px; border: 1px solid var(--border-subtle); }
        .nav-step.active { background: rgba(55, 138, 221, 0.15); border-color: var(--accent-blue); color: #73bcf8; }
        .nav-step.done { background: rgba(40, 167, 69, 0.1); border-color: #28a745; color: #8ce99a; }

        /* Main container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem 2rem 4rem;
        }

        .page-title {
            font-size: clamp(2rem, 4vw, 2.8rem);
            font-weight: 700;
            margin-bottom: 0.3rem;
        }
        .page-subtitle {
            font-size: 1rem;
            color: var(--text-muted);
            font-weight: 300;
            margin-bottom: 2rem;
        }

        /* Cards */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 16px;
            padding: 1.8rem;
            backdrop-filter: blur(10px);
            transition: border-color 0.3s ease, box-shadow 0.3s ease, transform 0.3s ease;
            margin-bottom: 1.5rem;
            animation: fadeUp 0.6s ease-out forwards;
        }
        .card:hover {
            border-color: var(--border-active);
            box-shadow: 0 10px 30px rgba(55, 138, 221, 0.2);
        }
        .card h2, .card h3 {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 1.2rem;
            padding-bottom: 0.6rem;
            border-bottom: 1px solid var(--border-subtle);
        }

        /* Buttons */
        .btn {
            display: inline-block;
            padding: 0.85rem 2rem;
            border: none;
            border-radius: 10px;
            font-family: var(--font);
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
        }
        .btn-primary {
            background: linear-gradient(90deg, #1e3c72, #2a5298);
            color: white;
            border: 1px solid var(--accent-blue);
            box-shadow: 0 0 18px rgba(55, 138, 221, 0.3);
            width: 100%;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 1rem;
            padding: 1.1rem;
        }
        .btn-primary:hover {
            box-shadow: 0 0 35px rgba(55, 138, 221, 0.7);
            transform: translateY(-2px);
            border-color: #73bcf8;
        }
        .btn-green {
            background: linear-gradient(90deg, #1e5631, #4c9a2a);
            color: white;
            border: 1px solid #639922;
            box-shadow: 0 0 18px rgba(99, 153, 34, 0.3);
            width: 100%;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 1rem;
            padding: 1.1rem;
        }
        .btn-green:hover {
            box-shadow: 0 0 35px rgba(99, 153, 34, 0.7);
            transform: translateY(-2px);
        }
        .btn-danger {
            background: transparent;
            color: #ff8793;
            border: 1px solid #dc3545;
            width: 100%;
            text-align: center;
        }
        .btn-danger:hover {
            background: rgba(220, 53, 69, 0.1);
            box-shadow: 0 0 15px rgba(220,53,69,0.3);
        }

        /* Form Inputs */
        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: #e2e8f0;
            margin-bottom: 0.4rem;
            letter-spacing: 0.3px;
        }
        input[type="text"], input[type="number"], textarea, select {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border-subtle);
            border-radius: 8px;
            padding: 0.7rem 0.9rem;
            color: white;
            font-family: var(--font);
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }
        input[type="text"]:focus, input[type="number"]:focus, textarea:focus, select:focus {
            border-color: var(--accent-blue);
            box-shadow: 0 0 12px rgba(55, 138, 221, 0.2);
        }
        input[type="range"] {
            width: 100%;
            accent-color: var(--accent-blue);
            margin: 0.4rem 0;
        }
        .range-display {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--accent-blue);
            text-align: center;
            margin-bottom: 0.3rem;
        }
        .radio-group { display: flex; gap: 0.8rem; flex-wrap: wrap; }
        .radio-option {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            cursor: pointer;
            padding: 0.5rem 0.9rem;
            border: 1px solid var(--border-subtle);
            border-radius: 8px;
            font-size: 0.85rem;
            transition: all 0.2s ease;
        }
        .radio-option:hover { border-color: var(--accent-blue); }
        .radio-option input[type="radio"] { accent-color: var(--accent-blue); }
        .checkbox-group { display: flex; flex-wrap: wrap; gap: 0.6rem; margin-top: 0.3rem; }
        .checkbox-option {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            cursor: pointer;
            padding: 0.4rem 0.8rem;
            border: 1px solid var(--border-subtle);
            border-radius: 8px;
            font-size: 0.85rem;
            transition: all 0.2s ease;
        }
        .checkbox-option:hover { border-color: var(--accent-blue); }
        .checkbox-option input[type="checkbox"] { accent-color: var(--accent-blue); }

        /* Grid system */
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1.5rem; }
        .grid-4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 1rem; }
        @media (max-width: 900px) {
            .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
            nav { padding: 1rem; }
            .container { padding: 1rem; }
        }

        /* Alerts */
        .alert-error {
            background: rgba(220, 53, 69, 0.1);
            border: 1px solid #dc3545;
            border-radius: 8px;
            padding: 0.8rem 1rem;
            color: #ff8793;
            margin-bottom: 1rem;
            font-size: 0.9rem;
        }

        /* AI insights */
        .ai-insight {
            background: rgba(55, 138, 221, 0.08);
            border-left: 4px solid var(--accent-blue);
            padding: 10px 14px;
            border-radius: 0 8px 8px 0;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 0.6rem;
            animation: slideIn 0.3s ease-out;
        }
        .ai-insight-warning {
            background: rgba(220, 53, 69, 0.08);
            border-left-color: #dc3545;
            color: #ff8793;
        }

        /* Badges */
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .badge-blue { background: rgba(55,138,221,0.15); border: 1px solid var(--accent-blue); color: #73bcf8; }
        .badge-green { background: rgba(40,167,69,0.15); border: 1px solid #28a745; color: #8ce99a; }
        .badge-red { background: rgba(220,53,69,0.15); border: 1px solid #dc3545; color: #ff8793; }
        .badge-yellow { background: rgba(255,193,7,0.15); border: 1px solid #ffc107; color: #ffd8a8; }
        .badge-queued { background: rgba(160,174,192,0.15); border: 1px solid #a0aec0; color: #a0aec0; }

        /* Progress Bar */
        .progress-bar-track {
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-blue), #73bcf8);
            border-radius: 3px;
            transition: width 0.5s ease;
        }

        /* Stat card */
        .stat-card {
            background: var(--bg-card);
            border: 1px solid rgba(55,138,221,0.4);
            border-radius: 12px;
            padding: 1.3rem;
            text-align: center;
            transition: all 0.3s ease;
            box-shadow: 0 0 12px rgba(55,138,221,0.1);
        }
        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 0 25px rgba(55,138,221,0.4);
            border-color: #73bcf8;
        }
        .stat-card-value { font-size: 1rem; font-weight: 600; }

        /* Animations */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(18px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }
        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(55, 138, 221, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 25px rgba(55, 138, 221, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(55, 138, 221, 0); }
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
<nav>
    <div class="nav-brand">⚕️ MedMirror</div>
    <div class="nav-steps">
        <span class="nav-step {% block step1 %}{% endblock %}">1 Patient</span>
        <span style="color: var(--text-dim)">›</span>
        <span class="nav-step {% block step2 %}{% endblock %}">2 Twin</span>
        <span style="color: var(--text-dim)">›</span>
        <span class="nav-step {% block step3 %}{% endblock %}">3 Simulate</span>
        <span style="color: var(--text-dim)">›</span>
        <span class="nav-step {% block step4 %}{% endblock %}">4 Report</span>
    </div>
</nav>

{% block content %}{% endblock %}

</body>
</html>
